<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Shop</title>
    <link href="../css/output.css" rel="stylesheet">
</head>

<body class="bg-gray-200">
    <div class="flex flex-col min-h-screen border-2">
    
      <header class="border-2 bg-[#D9D9D9] border-green-600
        flex justify-between items-center flex-row text-md
        sm:text-xl
        md:py-2
        lg:pr-4
      ">
        <a href="../index.html">
            <div class="hidden items-center justify-center bg-[#2D2D2D] text-white rounded-full font-bold
                sm:flex sm:ml-1 sm:px-3 sm:py-2 sm:mr-1
                lg:ml-3 lg:px-10
            ">
                ShopName 
            </div>
        </a>
        
        <div class="flex flex-1 justify-center

        ">
            <input type="text" placeholder="Hľadáte niečo?" class="bg-[#2D2D2D] text-white text-center rounded-full 
                p-1 ml-1 mr-3 w-full
                sm:max-w-md sm:p-2 sm:m-1.5
                md:max-w-2xl 
                lg:max-w-lg 
                xl:max-w-4xl 
            ">
        </div>
        
        <div class="flex items-center justify-between">
            <a href="pages/login_page.html">
                <button class=" bg-[#D9D9D9]
                    hidden text-xs rounded-full
                    sm:flex sm:text-lg sm:mr-3 sm:pl-3 sm:pr-2
                    hover:brightness-85 active:brightness-85
                ">
                    Hosť - Login
                </button>
            </a>

            <img src="../images/user.png" alt="profile" class="object-contain
                bg-[#D9D9D9] hover:brightness-85 active:brightness-85
                hidden h-10 
                sm:flex sm:h-12 sm:mr-2
                
            ">
            <a href="pages/kosik_page.html">
                <img src="../images/cart.png" alt="cart" class="object-contain
                bg-[#D9D9D9] hover:brightness-85 active:brightness-85
                flex h-10 pr-2
                sm:h-12 sm:mr-2
                lg:pr-2
            ">
            </a>
            
            <span class="flex items-center pr-3
                sm:text-2xl
            ">0.00 €</span>
        </div>
        
      </header>

      <div class="flex flex-row grow border-2 bg-[#D9D9D9] border-lime-900">

        <div class="border-2 border-amber-500 justify-center 
            hidden
            lg:flex lg:w-[10%] lg:text-2xl lg:text-center lg:items-center
            
        ">
            Výpredaj až -30%
        </div>

          <div class="flex flex-col grow">
                  
            <div class="border-3 border-blue-400 bg-white
                grid grid-cols-3 py-2 px-15
            ">
                <div class="flex flex-col items-center">
                    <span>Košík</span>
                    <span class="flex rounded-full items-center justify-center w-10 h-10 bg-[#D9D9D9]">1</span>
                </div>
                
                <div class="flex flex-col items-center">
                    <span>Doprava</span>
                    <span class="flex rounded-full items-center justify-center w-10 h-10 bg-[#D9D9D9]">2</span>
                </div>

                <div class="flex flex-col font-bold items-center">
                    <span>Dodacie údaje</span>
                    <span class="flex rounded-full items-center justify-center w-10 h-10 text-white bg-black">3</span>
                </div>
        
            </div>


            <div class="flex flex-col flex-1 px-5 mt-10">
    
                <div class="flex flex-row font-bold text-lg justify-center py-2">
                    Kontaktné údaje
                </div>
                
                <div class="flex flex-row gap-10">
                    <div class="flex flex-col flex-1 py-5">
                        <span class="font-bold text-sm mb-1 ml-3">
                            Krstné meno
                        </span>
                        <input 
                            type="text" 
                            placeholder="Krstné meno" 
                            class="px-4 ml-2 mr-2 py-3 bg-white rounded-2xl"
                        />

                        <span class="font-bold text-sm mt-3 mb-1 ml-3">
                            Telefonne číslo
                        </span>
                        <input 
                            type="text" 
                            placeholder="+421 ... ... ..." 
                            class="px-4 ml-2 mr-2 py-3 bg-white rounded-2xl"
                        />
                    </div>

                    <div class="flex flex-col flex-1 py-5">
                        <span class="font-bold text-sm mb-1 ml-3">
                            Priezvisko
                        </span>
                        <input 
                            type="text" 
                            placeholder="Priezvisko" 
                            class="px-4 ml-2 mr-2 py-3 bg-white rounded-2xl"
                        />

                        <span class="font-bold text-sm mt-3 mb-1 ml-3">
                            Emailová adresa
                        </span>
                        <input 
                            type="text" 
                            placeholder="your@email.com" 
                            class="px-4 ml-2 mr-2 py-3 bg-white rounded-2xl"
                        />
                    </div>

                </div>
                <div class="w-full mt-10 h-[0.5px] bg-gray-500"></div>
                <div class="flex flex-col items-center font-bold text-lg mt-5 justify-center py-2">
                        Adresa doručenia
                </div>

                <div class="flex flex-row gap-10">
                    <div class="flex flex-col flex-1 py-5">
                        <span class="font-bold text-sm mb-1 ml-3">
                            Mesto
                        </span>
                        <input 
                            type="text" 
                            placeholder="Mesto" 
                            class="px-4 ml-2 mr-2 py-3 bg-white rounded-2xl"
                        />

                        <span class="font-bold text-sm mt-3 mb-1 ml-3">
                            Smerové číslo (PSČ)
                        </span>
                        <input 
                            type="text" 
                            placeholder="PSČ" 
                            class="px-4 ml-2 mr-2 py-3 bg-white rounded-2xl"
                        />
                    </div>

                    <div class="flex flex-col flex-1 py-5">
                        <span class="font-bold text-sm mb-1 ml-3">
                            Ulica
                        </span>
                        <input 
                            type="text" 
                            placeholder="Ulica, číslo" 
                            class="px-4 ml-2 mr-2 py-3 bg-white rounded-2xl"
                        />

                        <span class="font-bold text-sm mt-3 mb-1 ml-3">
                            Štát
                        </span>
                        <input 
                            type="text" 
                            placeholder="Slovenská republika" 
                            class="px-4 ml-2 mr-2 py-3 bg-white rounded-2xl"
                        />
                    </div>

                </div>
                <div class="flex flex-1"></div>

                <div class="flex flex-row items-center justify-between w-full p-6">
    
                    <div class="flex-1 text-gray-600">
                        <span>Späť na dopravu</span>
                    </div>

                    <button class="font-bold py-4 px-20 pl-20 rounded-2xl border-2 bg-white text-black">
                        Prejsť k platbe
                    </button>

                </div>
            </div>
        </div>

        <div class="
            hidden items-center
            lg:flex md:w-[5%]
            border
        ">
        </div>

      </div>

        <footer class="flex justify-between border-2 border-blue-500 bg-[#D9D9D9]
            text-sm items-center py-2 text-center
            sm:text-base sm:px-5
            md:text-lg
            lg:text-xl lg:px-10
            xl:text-2xl xl:px-20
        ">
            <span>
                About us
            </span>

            <span>
                Copyright 2026, H & H, všetky práva vyhradené
            </span>

            <span>
                +421 999 999 999
            </span>
        </footer>

    </div>

</body>

</html>
