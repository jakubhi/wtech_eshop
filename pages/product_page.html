<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Shop</title>
    <link href="../css/output.css" rel="stylesheet">
</head>

<body class="bg-gray-200">
    <div class="flex flex-col min-h-screen border-2 border-red-500">
    
      <header class="border-2 bg-[#D9D9D9] border-green-600
        flex justify-between items-center flex-row text-md
        sm:text-xl
        md:py-2
        lg:pr-4
      ">
        <div class="hidden items-center justify-center bg-[#2D2D2D] text-white rounded-full font-bold
            sm:flex sm:ml-1 sm:px-3 sm:py-2 sm:mr-1
            lg:ml-3 lg:px-10
        ">
            ShopName 
        </div>
        
        <div class="flex flex-1 justify-center

        ">
            <input type="text" placeholder="Hľadáte niečo?" class="bg-[#2D2D2D] text-white text-center rounded-full 
                p-1 ml-1 mr-3 w-full
                sm:max-w-md sm:p-2 sm:m-1.5
                md:max-w-2xl 
                lg:max-w-lg 
                xl:max-w-4xl 
            ">
        </div>
        
        <div class="flex items-center justify-between">
            <button class=" bg-[#D9D9D9]
                hidden text-xs rounded-full
                sm:flex sm:text-lg sm:mr-3 sm:pl-3 sm:pr-2
                hover:brightness-85 active:brightness-85
            ">
                Hosť - Login
            </button>
            <img src="../images/user.png" alt="profile" class="object-contain
                bg-[#D9D9D9] hover:brightness-85 active:brightness-85
                hidden h-10 
                sm:flex sm:h-12 sm:mr-2
                
            ">
            
            <img src="../images/cart.png" alt="cart" class="object-contain
                bg-[#D9D9D9] hover:brightness-85 active:brightness-85
                flex h-10 pr-2
                sm:h-12 sm:mr-2
                lg:pr-2
            ">
            <span class="flex items-center pr-3
                sm:text-2xl
            ">0.00 €</span>
        </div>
        
      </header>

      <div class="flex flex-row grow border-2 bg-[#D9D9D9] border-lime-900">

        <div class="border-2 border-amber-500 justify-center 
            hidden
            lg:flex lg:w-[10%] lg:text-2xl lg:text-center lg:items-center
            
        ">
            Výpredaj až -30%
        </div>
          <div class="flex flex-row grow border-5">
                     
            <div class="
                flex flex-col ml-5 mt-5 w-110
            ">
                <div class="flex flex-1 border border-purple-500 mr-2">
                    <img src="../images/product5.png" alt="product logo" class="">
                </div>

                <div class="flex flex-1 border border-black-500">

                </div>
                
            </div>

            <div class="
                flex flex-col w-full mt-5 justify-center
                border-green-500 border
                ">
                <div class="flex flex-col">
                    <div class="border-red-500 border
                     flex flex-1 justify-center text-xl font-bold
                     ">
                        Jesenná bunda
                    </div>
                    <div class="border-green-500 border
                     flex flex-col flex-1 justify-center">
                        <p class="mt-2 px-2">
                            Sed ut perspiciatis unde omnis iste natus
                             error sit voluptatem  accusantium doloremque
                              laudantium, totam rem aperiam, eaque ipsa 
                              quae ab illo inventore
                        </p>      
                        <p class="mt-2 px-2 font-light">
                            Zobraziť viac
                        </p>                  
                    </div>    
                    <div class="flex flex-col">
                        <select class="bg-white border border-gray-800
                            rounded-xl py-2 px-4 mt-2 ml-5 mr-5 mb-1 r-10
                        ">
                            <option disabled selected>Vyberte veľkosť</option>
                            <option>Veľkosť: S</option>
                            <option>Veľkosť: M</option>
                            <option>Veľkosť: L</option>
                            <option>Veľkosť: XL</option>
                        </select>
                    </div>     

                    <div class="flex flex-col">
                        <select class="bg-white border border-gray-800
                            rounded-xl py-2 px-4 ml-5 mr-5 r-10
                        ">
                            <option disabled selected>Vyberte farbu</option>
                            <option>Veľkosť: S</option>
                            <option>Veľkosť: M</option>
                            <option>Veľkosť: L</option>
                            <option>Veľkosť: XL</option>
                        </select>
                    </div>   
                </div>

                <div class="border-10 border-[#87838393] mx-8 my-4"></div>
                    

                <div class="
                    flex flex-1 border-black-500 border">
                </div>
            </div>
























          </div>

          <div class="border-2 border-amber-500
                hidden items-center
                lg:flex md:w-[5%]
            ">
          </div>

      </div>

      <footer class="flex justify-between border-2 border-blue-500 bg-[#D9D9D9]
        text-sm items-center py-2 text-center
        sm:text-base sm:px-5
        md:text-lg
        lg:text-xl lg:px-10
        xl:text-2xl xl:px-20
    ">
            <span>
                About us
            </span>

            <span>
                Copyright 2026, H & H, všetky práva vyhradené
            </span>

            <span>
                +421 999 999 999
            </span>
      </footer>

    </div>

</body>

</html>
