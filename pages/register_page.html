<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registracia | E-Shop</title>
    <link href="../css/output.css" rel="stylesheet">
</head>

<body class="bg-gray-200 flex flex-col min-h-screen border-2">
    <header> </header>
    <div class="bg-white flex flex-col items-center grow justify-center">
        <div class="mb-2">Registračný formulár</div>
        <section class="bg-gray-200 border-4 w-[90%] md:w-3/5 flex flex-col items-center px-6 py-12 gap-y-4">
            <fieldset class="bg-gray-200 rounded-md border-black border-2 md:w-1/2">
                <legend class="ml-2 px-2">Meno</legend>
                <input type="text" class="w-full bg-transparent" placeholder=" ">
            </fieldset>
            <fieldset class="bg-gray-200 rounded-md border-black border-2 w-[90%] md:w-1/2 ">
                <legend class="ml-2 px-2">Heslo</legend>
                <input type="text" class="w-full " placeholder=" ">
            </fieldset>
            <fieldset class="bg-gray-200 rounded-md border-black border-2 w-[90%] md:w-1/2 ">
                <legend class="ml-2 px-2">Email</legend>
                <input type="text" class="w-full " placeholder=" ">
            </fieldset>
            <button class="border-2 border-black rounded mt-3 w-[90%] md:w-1/4">Registrácia</button>
        </section>
    </div>

    <footer class=" bg-[#D9D9D9]
        text-sm items-center py-2 text-center
        sm:text-base sm:px-5
        md:text-md
        lg:text-xl lg:px-10
        xl:text-2xl xl:px-20
    ">
        <div class="grid grid-cols-3 h-1/5 justify-between items-center">
            <div class="
                w-[10%]
            ">
            </div>
            <div class="col-start-1">
                <span class="font-bold">Potrebujete pomôcť?</span>
                <ul class="space-y-1"> <li>Navštívte našu pobočku:</li>
                    <li>Po-Pia 9:00 - 20:00</li>
                    <li>alebo</li>
                    <li>volajte +421 999 999 999</li>
                </ul>
            </div>
            <div class="col-start-2">
                <span>Copyright 2026, H & H, všetky práva vyhradené</span>
            </div>

            <div class="flex flex-col justify-center items-center">
                <span class="font-bold">Sociálne médiá</span>
                <ul class="space-y-2 flex flex-col items-center"> <li>Navštívte našu pobočku:</li>
                    <li class="flex items-center gap-x-3">
                        <div class="flex w-8 h-8 items-center justify-center">
                            <img src="/images/facebook.png" class="object-contain">
                        </div>
                        <span>Facebook</span>
                    </li>
                    <li class="flex items-center gap-x-3">
                        <div class="flex w-8 h-8 items-center justify-center">
                            <img src="/images/instagram.png" class="object-contain">
                        </div>
                        <span>Instagram</span>
                    </li>
                    <li class="flex items-center gap-x-3">
                        <div class="flex w-8 h-8 items-center justify-center">
                            <img src="/images/youtube.png" class="object-contain">
                        </div>
                        <span>YouTube</span>
                    </li>
                </ul>
            </div>
            <div class="
                w-[5%]
            ">
            </div>
        </div>
      </footer>

</body>
