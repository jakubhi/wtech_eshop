<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registracia | E-Shop</title>
    <link href="../css/output.css" rel="stylesheet">
</head>

<body class="bg-linear-to-b from-gray-100 to-[#adadad] bg-white flex flex-col min-h-screen border-2">
    <header></header>
    <main class="flex flex-col items-center grow justify-center">
        <div class="mb-2 text-lg">Registračný formulár</div>
        <form action="/pages/login_page.html" method="get" class="bg-gray-300 border-4 
            flex flex-col items-center px-6 py-10 gap-y-1
            sm:w-[45%]
            md:w-[40%]
            lg:w-[35%]
            xl:w-[30%]
        ">
            <div class="bg-[#d7d7d7] rounded-md border-black border-2
                sm:w-[90%]
                md:w-[80%]
                lg:w-[70%]
            ">
                <label for="meno" class="ml-2 px-2 block">Meno</label>
                <input id="meno" name="meno" type="text" class="w-full bg-transparent outline-none pl-2 font-bold" required>
            </div>
            <div class="bg-[#d7d7d7] rounded-md border-black border-2
                sm:w-[90%]
                md:w-[80%]
                lg:w-[70%]
            ">
                <label for="heslo" class="ml-2 px-2 block">Heslo</label>
                <input id="heslo" name="heslo" type="password" class="w-full bg-transparent outline-none pl-2 font-bold" required>
            </div>
            <div class="bg-[#d7d7d7] rounded-md border-black border-2
                sm:w-[90%]
                md:w-[80%]
                lg:w-[70%]
            ">
                <label for="email" class="ml-2 px-2 block">Email</label>
                <input id="email" name="email" type="email" class="w-full bg-transparent outline-none pl-2 font-bold" autocomplete="email" required>
            </div>
            <button type="submit" class="items-center px-6 rounded-md font-bold border-2 border-black hover:bg-gray-300 hover:text-white
                mb-10 p-1
                mt-3
            ">
                Registrácia
            </button>
        </form>
    </main>

    <footer></footer>

</body>
</html>
