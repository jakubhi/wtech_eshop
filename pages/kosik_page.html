<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Shop</title>
    <link href="../css/output.css" rel="stylesheet">
</head>

<body class="bg-gray-200">
    <div class="flex flex-col min-h-screen border-2">
    
      <header class="border-2 bg-[#D9D9D9] 
        flex justify-between items-center flex-row text-md
        sm:text-xl
        md:py-2
        lg:pr-4
      ">
        <div class="hidden items-center justify-center bg-[#2D2D2D] text-white rounded-full font-bold
            sm:flex sm:ml-1 sm:px-3 sm:py-2 sm:mr-1
            lg:ml-3 lg:px-10
        ">
            ShopName 
        </div>
        
        <div class="flex flex-1 justify-center

        ">
            <input type="text" placeholder="Hľadáte niečo?" class="bg-[#2D2D2D] text-white text-center rounded-full 
                p-1 ml-1 mr-3 w-full
                sm:max-w-md sm:p-2 sm:m-1.5
                md:max-w-2xl 
                lg:max-w-lg 
                xl:max-w-4xl 
            ">
        </div>
        
        <div class="flex items-center justify-between">
            <button class=" bg-[#D9D9D9]
                hidden text-xs rounded-full
                sm:flex sm:text-lg sm:mr-3 sm:pl-3 sm:pr-2
                hover:brightness-85 active:brightness-85
            ">
                Hosť - Login
            </button>
            <img src="../images/user.png" alt="profile" class="object-contain
                bg-[#D9D9D9] hover:brightness-85 active:brightness-85
                hidden h-10 
                sm:flex sm:h-12 sm:mr-2
                
            ">
            
            <img src="../images/cart.png" alt="cart" class="object-contain
                bg-[#D9D9D9] hover:brightness-85 active:brightness-85
                flex h-10 pr-2
                sm:h-12 sm:mr-2
                lg:pr-2
            ">
            <span class="flex items-center pr-3
                sm:text-2xl
            ">0.00 €</span>
        </div>
        
      </header>

      <core class="flex grow bg-white flex-col">
        <section class="bg-whitegrid grid-cols-3 py-2 px-15 flex flex-row justify-center w-screen gap-60">
                <div class="flex flex-col font-bold  items-center">
                    <span>Košík</span>
                    <span class="flex rounded-full items-center justify-center w-10 h-10 text-white bg-black">1</span>
                </div>
                
                <div class="flex flex-col items-center">
                    <span>Doprava</span>
                    <span class="flex rounded-full items-center justify-center w-10 h-10 bg-[#D9D9D9]">2</span>
                </div>

                <div class="flex flex-col items-center">
                    <span>Dodacie údaje</span>
                    <span class="flex rounded-full items-center justify-center w-10 h-10  bg-[#D9D9D9]">3</span>
                </div>
        
            </section>
        <section class="bg-white flex flex-row grow">
            <div class="border border-black grow grid grid-cols-1">

                 <div class="border-2 border-black rounded m-8 flex flex-row">
                    <div class="flex flex-row w-4/5">
                        <div class="ml-4 mb-6 mt-4 w-16 h-20 rounded-lg bg-gray-200">
                        <img src="../images/product3.png" alt="product icon" >
                        </div>
                        <div class="text-lg font-semibold ml-4 mt-4">Moderné tepláky XL</div>
                    </div>
                    
                    <div class="flex justify-end w-1/5">
                        <div class="text-xl flex flex-col justify-center mr-4 font-semibold">25,99€</div>
                    </div>
                    
                 </div>

                 <div class="border-2 border-black rounded m-8 flex">
                    <div class="flex flex-row w-4/5">
                        <div class="ml-4 mb-6 mt-4 w-16 h-20 rounded-lg bg-gray-200">
                        <img src="../images/product6.png" alt="product icon" >
                        </div>
                        <div class="text-lg font-semibold ml-4 mt-4">Čierna dámska sukňa M</div>
                    </div>
                    
                    <div class="flex justify-end w-1/5">
                        <div class="text-xl flex flex-col justify-center font-semibold mr-4">25,99€</div>
                    </div>
                 </div>
                 
                 <div class="border-2 border-black rounded m-8 flex">
                    <div class="flex flex-row w-4/5">
                        <div class="ml-4 mb-6 mt-4 w-16 h-20 rounded-lg bg-gray-200">
                        <img src="../images/product4.png" alt="product icon" >
                        </div>
                        <div class="text-lg font-semibold ml-4 mt-4">Letné dámske šaty M</div>
                    </div>
                    
                    <div class="flex justify-end w-1/5">
                        <div class="text-xl flex flex-col justify-center font-semibold mr-4">25,99€</div>
                    </div>
                 </div>

            </div>
            <div class="flex flex-col grow border border-black">
                <div class="text-3xl font-bold mt-6 flex justify-center">Zhrnutie</div>
                <div class="text-lg font-semibold mt-4 ml-2">Počet produktov v košíku: 3</div>
                <div class="text-lg font-semibold mt-1 ml-2">Celkom ušetrené 8,02€</div>
                <div class=" mt-auto ml-2 flex flex-row mb-2 w-full justify-between">
                    <div class="text-lg font-semibold ml-2">Celková suma:</div>
                    <div class="flex text-2xl font-semibold mr-6">133,97€</div>
                </div>
            </div>
        </section>

        <section class="bg-white w-screen border-2 border-black flex justify-end">
            <button class="bg-gray-200 rounder p-4 mt-6 mr-6 ml-2 mb-6 ">Prejsť na dopravu a platbu</button>
        </section>

      </core>

      <footer class="flex justify-between border-2 bg-[#D9D9D9]
        text-sm items-center py-2 text-center
        sm:text-base sm:px-5
        md:text-lg
        lg:text-xl lg:px-10
        xl:text-2xl xl:px-20
    ">
            <span>
                About us
            </span>

            <span>
                Copyright 2026, H & H, všetky práva vyhradené
            </span>

            <span>
                +421 999 999 999
            </span>
      </footer>

    </div>

</body>

</html>
