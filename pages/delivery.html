<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Shop</title>
    <link href="../css/output.css" rel="stylesheet">
</head>

<body class="bg-gray-200">
    <div class="flex flex-col min-h-screen">
    
      <header class="bg-[#D9D9D9]
        flex justify-between items-center flex-row text-md
        sm:text-xl
        md:py-2
        lg:pr-4
      ">
        <a href="../index.html">
            <div class="hidden items-center justify-center bg-[#2D2D2D] text-white rounded-full font-bold
                sm:flex sm:ml-1 sm:px-3 sm:py-2 sm:mr-1
                lg:ml-3 lg:px-10
            ">
                ShopName 
            </div>
        </a>
        
        <div class="flex flex-1 justify-center

        ">
            <input type="text" placeholder="Hľadáte niečo?" class="bg-[#2D2D2D] text-white text-center rounded-full 
                p-1 ml-1 mr-3 w-full
                sm:max-w-md sm:p-2 sm:m-1.5
                md:max-w-2xl 
                lg:max-w-lg 
                xl:max-w-4xl 
            ">
        </div>
        
        <div class="flex items-center justify-between">
            <a href="login_page.html">
                <button class=" bg-[#D9D9D9]
                    hidden text-xs rounded-full
                    sm:flex sm:text-lg sm:mr-3 sm:pl-3 sm:pr-2
                    hover:brightness-85 active:brightness-85
                ">
                    Hosť - Login
                </button>
            </a>

            <img src="../images/user.png" alt="profile" class="object-contain
                bg-[#D9D9D9] hover:brightness-85 active:brightness-85
                hidden h-10 
                sm:flex sm:h-12 sm:mr-2
                
            ">
            <a href="kosik_page.html">
                <img src="../images/cart.png" alt="cart" class="object-contain
                bg-[#D9D9D9] hover:brightness-85 active:brightness-85
                flex h-10 pr-2
                sm:h-12 sm:mr-2
                lg:pr-2
            ">
            </a>
            
            <span class="flex items-center pr-3
                sm:text-2xl
            ">0.00 €</span>
        </div>
        
      </header>

      <div class="flex flex-row flex-1 bg-[#D9D9D9]">

        
          <div class="flex flex-col flex-1 bg-white">
                <section class="flex flex-row justify-center f-1 py-2 px-15 gap-60">
                    <div class="flex flex-col items-center">
                        <span>Košík</span>
                        <span class="flex rounded-full items-center justify-center w-10 h-10 bg-[#D9D9D9]">1</span>
                    </div>
                    
                    <div class="flex flex-col font-bold items-center">
                        <span>Doprava</span>
                        <span class="flex rounded-full items-center justify-center w-10 h-10 text-white bg-black">2</span>
                    </div>

                    <div class="flex flex-col items-center">
                        <span>Dodacie údaje</span>
                        <span class="flex rounded-full items-center justify-center w-10 h-10  bg-[#D9D9D9]">3</span>
                    </div>
                </section>

                <div class="flex w-full flex-1 gap-x-5 m-5">
                    <div class="flex flex-col w-7/12 px-5">
                        <span class="font-bold text-xl py-5">
                            Zvoľte spôsob doručenia
                        </span>
                        
                        <div class="flex flex-col gap-y-3">
                            <label class="flex items-center p-4 rounded-xl border border-[#D9D9D9]">
                                <input type="radio" class="hidden peer" name="doprava">
                                <div class="w-7 h-7 rounded-xl peer-checked:bg-green-300 bg-gray-300">
                                </div>
                                <span class="text-lg ml-5">
                                    Doručiť do Eshop boxu
                                </span>
                            </label>

                            <label class="flex items-center p-4 rounded-xl border border-[#D9D9D9]">
                                <input type="radio" class="hidden peer" name="doprava">
                                <div class="w-7 h-7 rounded-xl peer-checked:bg-green-300 bg-gray-300">
                                </div>
                                <span class="text-lg ml-5">
                                    Doručenie domov
                                </span>
                            </label>

                            <label class="flex items-center p-4 rounded-xl border border-[#D9D9D9]">
                                <input type="radio" class="hidden peer" name="doprava">
                                <div class="w-7 h-7 rounded-xl peer-checked:bg-green-300 bg-gray-300">
                                </div>
                                <span class="text-lg ml-5">
                                    Osobné vyzdvihnutie na pobočke
                                </span>
                            </label>
                        </div>

                        <hr class="mt-10 mb-5 border-[#D9D9D9]">
                        
                        <div class="flex flex-col gap-y-2">
                            <span class="font-bold text-xl py-5">
                                Zvoľte spôsob platby
                            </span>
                            
                            <label class="flex items-center p-4 rounded-xl border border-[#D9D9D9]">
                                <input type="radio" class="hidden peer" name="platba">
                                <div class="w-7 h-7 rounded-xl peer-checked:bg-blue-200 bg-gray-300">
                                </div>
                                <span class="text-lg ml-5">
                                    Kartou online
                                </span>
                            </label>
                            
                            <label class="flex items-center p-4 rounded-xl border border-[#D9D9D9]">
                                <input type="radio" class="hidden peer" name="platba">
                                <div class="w-7 h-7 rounded-xl peer-checked:bg-blue-200 bg-gray-300">
                                </div>
                                <span class="text-lg ml-5">
                                    Platba pri prevzatí
                                </span>
                            </label>

                            <label class="flex items-center p-4 rounded-xl border border-[#D9D9D9]">
                                <input type="radio" class="hidden peer" name="platba">
                                <div class="w-7 h-7 rounded-xl peer-checked:bg-blue-200 bg-gray-300">
                                </div>
                                <span class="text-lg ml-5">
                                    Platba prevodom na účet
                                </span>
                            </label>
                        </div>                        
                    </div>

                    <div class="flex flex-col w-full flex-1 gap-x-5 m-5">
                        <div class="flex flex-col flex-1 text-lg">
                            <span class="font-bold text-2xl py-4">
                                Zhrnutie
                            </span>
                            <span>
                                Počet produktov v košíku: 3
                            </span>
                            <span>
                                Celkom ušetrené: 2,02€
                            </span>
                        </div>

                        <div class="flex flex-row justify-between border-t border-[#D9D9D9] items-end">
                            <span class="flex text-2xl">
                            Celková suma:
                            </span>
                            <span class="flex justify-end font-bold text-2xl mr-10">
                                14,97€
                            </span>
                        </div>
                    </div>
                </div>

                <div class="flex">
                    <section class="flex flex-1 justify-start">
                        <a href="kosik_page.html">
                            <button class="p-4 mt-6 mr-6 ml-2 mb-6 border rounded-xl bg-[#D9D9D9]">
                                Späť do košíka
                            </button>
                        </a>
                    </section>

                    <section class="flex flex-1 justify-end">
                        <a href="contact_info.html">
                            <button class="p-4 mt-6 mr-6 ml-2 mb-6 border rounded-xl bg-[#D9D9D9]">
                                Prejsť na dodacie údaje
                            </button>
                        </a>
                    </section>
                </div>
          </div>

      </div>

      <footer class="flex justify-between bg-[#D9D9D9]
        text-sm items-center py-2 text-center
        sm:text-base sm:px-5
        md:text-lg
        lg:text-xl lg:px-10
        xl:text-2xl xl:px-20
    ">
            <span>
                About us
            </span>

            <span>
                Copyright 2026, H & H, všetky práva vyhradené
            </span>

            <span>
                +421 999 999 999
            </span>
      </footer>

    </div>

</body>

</html>
