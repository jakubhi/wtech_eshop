<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Shop</title>
    <link href="../css/output.css" rel="stylesheet">
</head>

<body class="bg-gray-200">
    <div class="flex flex-col min-h-screen border-2 border-red-500">
    
      <header class="border-2 bg-[#D9D9D9] border-green-600
        flex justify-between items-center flex-row text-md
        sm:text-xl
        md:py-2
        lg:pr-4
      ">
        <a href="../index.html">
            <div class="hidden items-center justify-center bg-[#2D2D2D] text-white rounded-full font-bold
                sm:flex sm:ml-1 sm:px-3 sm:py-2 sm:mr-1
                lg:ml-3 lg:px-10
            ">
                ShopName 
            </div>
        </a>
        
        <div class="flex flex-1 justify-center

        ">
            <input type="text" placeholder="Hľadáte niečo?" class="bg-[#2D2D2D] text-white text-center rounded-full 
                p-1 ml-1 mr-3 w-full
                sm:max-w-md sm:p-2 sm:m-1.5
                md:max-w-2xl 
                lg:max-w-lg 
                xl:max-w-4xl 
            ">
        </div>
        
        <div class="flex items-center justify-between">
            <a href="login_page.html">
                <button class=" bg-[#D9D9D9]
                    hidden text-xs rounded-full
                    sm:flex sm:text-lg sm:mr-3 sm:pl-3 sm:pr-2
                    hover:brightness-85 active:brightness-85
                ">
                    Hosť - Login
                </button>
            </a>

            <img src="../images/user.png" alt="profile" class="object-contain
                bg-[#D9D9D9] hover:brightness-85 active:brightness-85
                hidden h-10 
                sm:flex sm:h-12 sm:mr-2
                
            ">
            <a href="kosik_page.html">
                <img src="../images/cart.png" alt="cart" class="object-contain
                bg-[#D9D9D9] hover:brightness-85 active:brightness-85
                flex h-10 pr-2
                sm:h-12 sm:mr-2
                lg:pr-2
            ">
            </a>
            
            <span class="flex items-center pr-3
                sm:text-2xl
            ">0.00 €</span>
        </div>
        
      </header>

      <div class="flex flex-row grow border-2 bg-[#D9D9D9] border-lime-900">

        
          <div class="flex flex-col grow bg-white">
                <section class="bg-whitegrid grid-cols-3 py-2 px-15 flex flex-row justify-center w-screen gap-60">
                <div class="flex flex-col items-center">
                    <span>Košík</span>
                    <span class="flex rounded-full items-center justify-center w-10 h-10 bg-[#D9D9D9]">1</span>
                </div>
                
                <div class="flex flex-col font-bold items-center">
                    <span>Doprava</span>
                    <span class="flex rounded-full items-center justify-center w-10 h-10 text-white bg-black">2</span>
                </div>

                <div class="flex flex-col items-center">
                    <span>Dodacie údaje</span>
                    <span class="flex rounded-full items-center justify-center w-10 h-10  bg-[#D9D9D9]">3</span>
                </div>
        
            </section>
          </div>

          <section class="bg-white w-screen border-2 border-black flex justify-end">
            <a href="contact_info.html">
                <button class="bg-gray-200 rounder p-4 mt-6 mr-6 ml-2 mb-6 rounded-xl">
                    Prejsť na dopravu a platbu
                </button>
            </a>
            
          </section>

          <div class="border-2 border-amber-500
                hidden items-center
                lg:flex md:w-[5%]
            ">
          </div>

      </div>

      <footer class="flex justify-between border-2 border-blue-500 bg-[#D9D9D9]
        text-sm items-center py-2 text-center
        sm:text-base sm:px-5
        md:text-lg
        lg:text-xl lg:px-10
        xl:text-2xl xl:px-20
    ">
            <span>
                About us
            </span>

            <span>
                Copyright 2026, H & H, všetky práva vyhradené
            </span>

            <span>
                +421 999 999 999
            </span>
      </footer>

    </div>

</body>

</html>
